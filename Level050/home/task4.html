<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="task4.css">
    <title>task4</title>
</head>
<body>
    <div class="box">
        <form>
            <h2>Contact Us</h2>
            <label for="name" class="name">Your Name*</label><br>
            <input type="text" placeholder="First Name" id="name">
            <input type="text" placeholder="Last Name" class="lastname"><br><br><br>
            <label for="email" class="email">EMAIL ADDRESS*</label><br>
            <input type="email" placeholder="Eg.example@email.com" class="emailinp">
            <br><br><br>
            <label for="tel" class="tel">PHONE NUMBER</label><br>
            <input type="tel" placeholder="Eg +1 800 000000">
            <br><br><br>
            <label for="massage" class="massage">MASSAGE*</label><br>
            <textarea id="massage" placeholder="Please enter your comments.."></textarea>
            <br>
            <button type="submit">Submit <i class="fa-solid fa-arrow-right"></i></button>
        </form>
    </div>
</body>
</html>
